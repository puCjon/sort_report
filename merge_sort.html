<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合併排序法演示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1, h2 {
            color: #333;
        }
        .array-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .array-element {
            width: 50px;
            height: 50px;
            background-color: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 5px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .highlight {
            background-color: #FF5722;
        }
        .left-part {
            background-color: #2196F3;
        }
        .right-part {
            background-color: #FFC107;
        }
        button {
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background-color: #0b7dda;
        }
        .complexity {
            background-color: #fff;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>合併排序法 (Merge Sort)</h1>

    <h2>操作原理</h2>
    <p>合併排序是一種分治演算法。它將數組分成兩半，遞歸地對兩半進行排序，然後將兩個已排序的子數組合併成一個有序數組。這種演算法的時間複雜度為O(n log n)，比簡單排序演算法更有效率。</p>
    <p>合併排序是穩定排序，且在實務應用中廣泛使用。</p>

    <h2>操作過程</h2>
    <div class="array-container" id="array-container">
        <!-- 數組元素將動態生成 -->
    </div>
    <button onclick="startSort()">開始排序</button>
    <button onclick="resetArray()">重置數組</button>
    <p id="step-info">點擊「開始排序」來查看排序過程。</p>

    <h2>複雜度</h2>
    <div class="complexity">
        <p><strong>時間複雜度：</strong></p>
        <ul>
            <li>最壞情況：O(n log n)</li>
            <li>最佳情況：O(n log n)</li>
            <li>平均情況：O(n log n)</li>
        </ul>
        <p><strong>空間複雜度：</strong>O(n) - 需要額外的空間來存儲臨時數組</p>
        <p><strong>穩定性：</strong>穩定排序 - 相等元素的相對順序不會改變</p>
    </div>

    <script>
        let array = [];
        let container = document.getElementById('array-container');
        let stepInfo = document.getElementById('step-info');
        let isSorting = false;

        function generateRandomArray(size = 8) {
            let newArray = [];
            for (let i = 0; i < size; i++) {
                newArray.push(Math.floor(Math.random() * 100) + 1);
            }
            return newArray;
        }

        function renderArray(highlightIndices = [], leftIndices = [], rightIndices = []) {
            container.innerHTML = '';
            array.forEach((num, index) => {
                let element = document.createElement('div');
                element.className = 'array-element';
                if (highlightIndices.includes(index)) {
                    element.classList.add('highlight');
                }
                if (leftIndices.includes(index)) {
                    element.classList.add('left-part');
                }
                if (rightIndices.includes(index)) {
                    element.classList.add('right-part');
                }
                element.textContent = num;
                container.appendChild(element);
            });
        }

        function resetArray() {
            array = generateRandomArray(8);
            renderArray();
            stepInfo.textContent = '點擊「開始排序」來查看排序過程。';
            isSorting = false;
        }

        async function startSort() {
            if (isSorting) return;
            isSorting = true;
            stepInfo.textContent = '開始排序...';
            await mergeSort(0, array.length - 1);
            renderArray();
            stepInfo.textContent = '排序完成！';
            isSorting = false;
        }

        async function mergeSort(left, right) {
            if (left >= right) return;

            let mid = Math.floor((left + right) / 2);

            // 分割左半
            renderArray([], Array.from({length: mid - left + 1}, (_, i) => left + i), []);
            stepInfo.textContent = `分割左半部分：索引 ${left} 到 ${mid}`;
            await sleep(1000);
            await mergeSort(left, mid);

            // 分割右半
            renderArray([], [], Array.from({length: right - mid}, (_, i) => mid + 1 + i));
            stepInfo.textContent = `分割右半部分：索引 ${mid + 1} 到 ${right}`;
            await sleep(1000);
            await mergeSort(mid + 1, right);

            // 合併
            await merge(left, mid, right);
        }

        async function merge(left, mid, right) {
            let leftArray = array.slice(left, mid + 1);
            let rightArray = array.slice(mid + 1, right + 1);
            let i = 0, j = 0, k = left;

            stepInfo.textContent = `合併左半 ${leftArray.join(', ')} 和右半 ${rightArray.join(', ')}`;
            await sleep(1000);

            while (i < leftArray.length && j < rightArray.length) {
                renderArray([k], Array.from({length: leftArray.length - i}, (_, idx) => left + idx), Array.from({length: rightArray.length - j}, (_, idx) => mid + 1 + idx));
                stepInfo.textContent = `比較 ${leftArray[i]} 和 ${rightArray[j]}`;
                await sleep(1000);

                if (leftArray[i] <= rightArray[j]) {
                    array[k] = leftArray[i];
                    i++;
                } else {
                    array[k] = rightArray[j];
                    j++;
                }
                renderArray([k]);
                k++;
                await sleep(1000);
            }

            while (i < leftArray.length) {
                array[k] = leftArray[i];
                renderArray([k]);
                i++;
                k++;
                await sleep(500);
            }

            while (j < rightArray.length) {
                array[k] = rightArray[j];
                renderArray([k]);
                j++;
                k++;
                await sleep(500);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 初始化
        resetArray();
    </script>
</body>
</html>
